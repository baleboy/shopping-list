# fly.toml app configuration file generated for server-patient-frost-6137 on 2026-03-28T18:51:58+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'server-patient-frost-6137'
primary_region = 'arn'

[env]
  SHOPPING_DATA_DIR = "/data"

[build]

[mounts]
  source = "shopping_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
